<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026년 5월 야근 근무 일지</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/subsets/Paperlogy-dynamic-subset.css">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161923;
    --card: #1e2330;
    --border: #2a3147;
    --accent: #4f8cff;
    --accent2: #f0a500;
    --accent3: #e05c6e;
    --text: #e8ecf4;
    --text-muted: #7a88a8;
    --team1: #4f8cff;
    --team2: #f0a500;
    --team3: #3ecf8e;
    --rank1: #ffd700;
    --rank2: #c0c0c0;
    --rank3: #cd7f32;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Paperlogy', sans-serif;
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #0d0f14 0%, #1a2240 50%, #0d1628 100%);
    border-bottom: 1px solid var(--border);
    padding: 36px 40px 28px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(79,140,255,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-top {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header-title {
    font-family: 'Paperlogy', sans-serif; font-weight: 800; letter-spacing: 1px;
    font-size: 48px;
    letter-spacing: 4px;
    color: #fff;
    line-height: 1;
  }
  .header-subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 6px;
    letter-spacing: 1px;
  }
  .header-meta {
    display: flex;
    gap: 20px;
  }
  .meta-box {
    text-align: center;
  }
  .meta-num {
    font-family: 'Paperlogy', sans-serif; font-weight: 800; letter-spacing: 1px;
    font-size: 32px;
    color: var(--accent);
    line-height: 1;
  }
  .meta-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
    letter-spacing: 0.5px;
  }

  /* Nav Tabs */
  .tabs {
    display: flex;
    gap: 0;
    padding: 0 40px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .tab {
    padding: 14px 22px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
    user-select: none;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* Main */
  .main { padding: 32px 40px; max-width: 1400px; margin: 0 auto; }

  /* Section */
  .section { display: none; }
  .section.active { display: block; }

  /* Top 5 */
  .top5-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 16px;
    margin-bottom: 40px;
  }
  @media (max-width: 900px) { .top5-grid { grid-template-columns: repeat(2, 1fr); } }

  .rank-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 18px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .rank-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  }
  .rank-card:nth-child(1) { border-color: var(--rank1); }
  .rank-card:nth-child(2) { border-color: var(--rank2); }
  .rank-card:nth-child(3) { border-color: var(--rank3); }

  .rank-badge {
    font-family: 'Paperlogy', sans-serif; font-weight: 800; letter-spacing: 1px;
    font-size: 52px;
    line-height: 1;
    opacity: 0.08;
    position: absolute;
    top: 8px; right: 14px;
  }
  .rank-card:nth-child(1) .rank-badge { color: var(--rank1); }
  .rank-card:nth-child(2) .rank-badge { color: var(--rank2); }
  .rank-card:nth-child(3) .rank-badge { color: var(--rank3); }
  .rank-card:nth-child(4) .rank-badge,
  .rank-card:nth-child(5) .rank-badge { color: var(--text-muted); }

  .rank-position {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 10px;
  }
  .rank-card:nth-child(1) .rank-position { color: var(--rank1); }
  .rank-card:nth-child(2) .rank-position { color: var(--rank2); }
  .rank-card:nth-child(3) .rank-position { color: var(--rank3); }
  .rank-card:nth-child(4) .rank-position,
  .rank-card:nth-child(5) .rank-position { color: var(--text-muted); }

  .rank-name {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  .rank-info {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 16px;
  }
  .rank-count {
    font-family: 'Paperlogy', sans-serif; font-weight: 800; letter-spacing: 1px;
    font-size: 38px;
    line-height: 1;
    color: var(--accent);
  }
  .rank-unit {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .rank-bar-wrap {
    margin-top: 14px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
  }
  .rank-bar {
    height: 4px;
    border-radius: 2px;
    background: var(--accent);
    transition: width 1s ease;
  }
  .rank-card:nth-child(1) .rank-bar { background: var(--rank1); }
  .rank-card:nth-child(2) .rank-bar { background: var(--rank2); }
  .rank-card:nth-child(3) .rank-bar { background: var(--rank3); }

  /* Table Section */
  .section-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-btn {
    padding: 7px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    font-family: 'Paperlogy', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .filter-btn.team1 { --tc: var(--team1); }
  .filter-btn.team2 { --tc: var(--team2); }
  .filter-btn.team3 { --tc: var(--team3); }
  .filter-btn.team1.active { background: var(--team1); border-color: var(--team1); }
  .filter-btn.team2.active { background: var(--team2); border-color: var(--team2); color: #000; }
  .filter-btn.team3.active { background: var(--team3); border-color: var(--team3); color: #000; }

  /* Data Table */
  .table-wrap {
    overflow-x: auto;
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    background: #12162080;
    padding: 12px 16px;
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    white-space: nowrap;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }
  tbody tr {
    border-bottom: 1px solid #1e2330;
    transition: background 0.15s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(79,140,255,0.05); }
  tbody td {
    padding: 11px 16px;
    color: var(--text);
    vertical-align: middle;
  }
  .td-date { color: var(--text-muted); font-size: 12px; white-space: nowrap; }
  .td-task { color: var(--text-muted); font-size: 12px; max-width: 320px; line-height: 1.5; }

  /* Team badge */
  .team-badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .t1 { background: rgba(79,140,255,0.15); color: var(--team1); }
  .t2 { background: rgba(240,165,0,0.15); color: var(--team2); }
  .t3 { background: rgba(62,207,142,0.15); color: var(--team3); }

  .role-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    background: var(--border);
    color: var(--text-muted);
  }

  /* Calendar */
  .cal-wrap {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    margin-bottom: 8px;
  }
  .cal-header {
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 1px;
    padding: 4px;
  }
  .cal-day {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 8px 8px;
    min-height: 72px;
    position: relative;
    font-size: 12px;
    transition: border-color 0.15s;
  }
  .cal-day.empty { background: transparent; border-color: transparent; }
  .cal-day.has-data { border-color: rgba(79,140,255,0.3); }
  .cal-day.has-data:hover { border-color: var(--accent); }
  .cal-day-num {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .cal-day.has-data .cal-day-num { color: var(--text); }
  .cal-dots { display: flex; flex-wrap: wrap; gap: 3px; }
  .cal-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    font-size: 0;
  }
  .cal-count {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .cal-day.has-data .cal-count { color: var(--accent); font-weight: 600; }

  /* Person detail */
  .person-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }
  .person-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    transition: border-color 0.15s, transform 0.15s;
    cursor: pointer;
  }
  .person-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }
  .person-card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }
  .person-name { font-size: 18px; font-weight: 700; }
  .person-cnt {
    font-family: 'Paperlogy', sans-serif; font-weight: 800; letter-spacing: 1px;
    font-size: 28px;
    color: var(--accent);
    line-height: 1;
  }
  .person-cnt span { font-size: 11px; font-family: 'Paperlogy', sans-serif; font-weight: 400; color: var(--text-muted); }
  .person-role { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; }
  .person-dates { display: flex; flex-wrap: wrap; gap: 5px; }
  .person-date-chip {
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    background: rgba(79,140,255,0.1);
    color: var(--accent);
    border: 1px solid rgba(79,140,255,0.2);
  }

  .note-box {
    background: rgba(240,165,0,0.07);
    border: 1px solid rgba(240,165,0,0.2);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 24px;
    font-size: 12px;
    color: var(--accent2);
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
</style>
</head>

</div>

// TABLE
function buildTable(filterTeam) {
  const tbody = document.getElementById('table-body');
  const filtered = filterTeam === 'all' ? data : data.filter(d => d.team === filterTeam);
  tbody.innerHTML = '';
  filtered.forEach((d, i) => {
    const tc = teamClass[d.team];
    tbody.innerHTML += `
      <tr>
        <td style="color:var(--text-muted);font-size:12px">${i+1}</td>
        <td class="td-date">${d.date.replace('2026년 ','').replace('일 ','일')}</td>
        <td><span class="team-badge ${tc}">${d.team}</span></td>
        <td><span class="role-badge">${d.role}</span></td>
        <td style="font-weight:600">${d.name}</td>
        <td class="td-task">${d.task}</td>
      </tr>`;
  });
}
buildTable('all');

function filterTable(team, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildTable(team);
}

  const teamSet = new Set(recs.map(r => r.team));
  let dots = '';
  if (teamSet.has('도시계획1팀')) dots += '<div class="cal-dot" style="background:var(--team1)" title="도시계획1팀"></div>';
  if (teamSet.has('도시계획2팀')) dots += '<div class="cal-dot" style="background:var(--team2)" title="도시계획2팀"></div>';
  if (teamSet.has('도시계획3팀')) dots += '<div class="cal-dot" style="background:var(--team3)" title="도시계획3팀"></div>';
  calGrid.innerHTML += `
    <div class="cal-day ${hasData ? 'has-data' : ''}">
      <div class="cal-day-num">${d}</div>
      ${hasData ? `<div class="cal-dots">${dots}</div><div class="cal-count">${recs.length}명</div>` : ''}
    </div>`;
}

// PEOPLE
const personGrid = document.getElementById('person-grid');
sorted.forEach(([name, cnt]) => {
  const info = personInfo[name];
  const tc = teamClass[info.team];
  const dates = (personDates[name] || []).sort((a,b) => a-b).map(d => `<span class="person-date-chip">${d}일</span>`).join('');
  personGrid.innerHTML += `
    <div class="person-card">
      <div class="person-card-top">
        <div>
          <div class="person-name">${name}</div>
          <div class="person-role"><span class="team-badge ${tc}" style="font-size:10px;padding:2px 6px">${info.team}</span> ${info.role}</div>
        </div>
        <div><div class="person-cnt">${cnt}<span>회</span></div></div>
      </div>
      <div class="person-dates">${dates}</div>
    </div>`;
});

// TABS
function showTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('section-' + id).classList.add('active');
}

// Update stats
document.getElementById('total-records').textContent = data.length;
document.getElementById('total-people').textContent = Object.keys(personCount).length;
const uniqueDates = new Set(data.map(d => d.date));
document.getElementById('total-days').textContent = uniqueDates.size;
</script>
</body>
</html>
