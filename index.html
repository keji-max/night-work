<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 공주님의 엄중한 무도회 초대장 👑</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Noto+Serif+KR:wght@400;700&display=swap');

        body {
            background: linear-gradient(135deg, #ffe5ec 0%, #ffb3c6 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Noto Serif KR', serif;
            color: #4a3b32;
        }

        .invitation-card {
            background: #ffffff;
            border: 5px double #fb6f92;
            border-radius: 20px;
            padding: 40px 30px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(251, 111, 146, 0.3);
            position: relative;
            overflow: hidden;
        }

        /* 공주풍 테두리 장식 */
        .invitation-card::before, .invitation-card::after {
            content: "✿";
            position: absolute;
            font-size: 24px;
            color: #ffb3c6;
        }
        .invitation-card::before { top: 15px; left: 15px; }
        .invitation-card::after { bottom: 15px; right: 15px; }

        .crown {
            font-size: 50px;
            animation: float 3s ease-in-out infinite;
            margin-bottom: 10px;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 28px;
            color: #ff5c8a;
            margin-top: 0;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 14px;
            color: #a37081;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }

        .content {
            line-height: 1.8;
            font-size: 16px;
            margin-bottom: 30px;
            background: #fff5f7;
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid #ff758f;
        }

        .content strong {
            color: #ff477e;
            font-size: 18px;
        }

        .royal-decree {
            font-size: 13px;
            color: #888;
            font-style: italic;
            border-top: 1px dashed #ffb3c6;
            padding-top: 15px;
        }

        .btn-go-home {
            display: inline-block;
            background: linear-gradient(45deg, #ff758f, #ff8fa3);
            color: white;
            padding: 15px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(255, 117, 143, 0.4);
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            font-size: 16px;
            font-family: 'Noto Serif KR', serif;
        }

        .btn-go-home:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 20px rgba(255, 117, 143, 0.6);
            background: linear-gradient(45deg, #ff477e, #ff758f);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="invitation-card">
        <div class="crown">👑</div>
        <h1>Princess Royal Invitation</h1>
        <div class="subtitle">~ 칼퇴근 영지로부터의 전갈 ~</div>

        <div class="content">
            오라버니·언니 오라버니,<br>
            오늘도 칭송받아 마땅할 노고에<br>
            치세를 표하옵니다.<br><br>

            다름이 아니오라, <strong>'야근'</strong>이라는 미천한 녀석이<br>
            귀하신 몸을 탐하려 한다는 소문을 들었습니다.<br><br>

            공주의 안위를 위해서라도,<br>
            해당 시각 이후의 업무는 <strong>'용납 불가'</strong> 이옵니다.<br>
            신데렐라의 마법도 12시엔 풀리는 법,<br>
            그대의 마법은 <b>정각 퇴근 시간</b>에 풀려야 마땅합니다.
        </div>

        <p class="royal-decree">"공주를 기다리게 하는 것은 대역죄인 줄 알라."</p>

        <button class="btn-go-home" onclick="alert('👑 탁월한 선택이십니다. 속히 마차(지하철/버스)에 오르시지요!')">
            지금 당장 PC 오프하고 퇴근하기
        </button>
    </div>

</body>
</html>
